{% extends "base.html" %}

{% block title %} Editar Arreglo - Eterna Flor {% endblock %}

{% block content %}
<div style="padding: 20px;">
    <h2 style="text-align: center; color: #d81b60; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
        Modificar Arreglo: {{ producto.nombre }}
    </h2>
    
    <div style="max-width: 500px; margin: auto; background: #fff5f7; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(216, 27, 96, 0.1); border: 1px solid #ffccd5;">
        
        <form action="{{ url_for('actualizar_arreglo') }}" method="POST">
            
            <input type="hidden" name="id" value="{{ producto.id }}">

            <div style="margin-bottom: 20px;">
                <label style="color: #d81b60; font-weight: bold; display: block; margin-bottom: 8px;">Nombre del Arreglo:</label>
                <input type="text" name="nombre" value="{{ producto.nombre }}" required 
                       style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ffccd5; outline: none; box-sizing: border-box;">
            </div>
            
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label style="color: #d81b60; font-weight: bold; display: block; margin-bottom: 8px;">Stock:</label>
                    <input type="number" name="cantidad" value="{{ producto.cantidad }}" required 
                           style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ffccd5; box-sizing: border-box;">
                </div>
                
                <div style="flex: 1;">
                    <label style="color: #d81b60; font-weight: bold; display: block; margin-bottom: 8px;">Precio ($):</label>
                    <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" required 
                           style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ffccd5; box-sizing: border-box;">
                </div>
            </div>
            
            <div style="margin-bottom: 25px;">
                <label style="color: #d81b60; font-weight: bold; display: block; margin-bottom: 8px;">Descripción:</label>
                <textarea name="descripcion" rows="4" 
                          style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ffccd5; resize: none; box-sizing: border-box;">{{ producto.descripcion }}</textarea>
            </div>
            
            <button type="submit" style="width: 100%; background-color: #ffa500; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.3s;">
                💾 Guardar Cambios en MySQL
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="{{ url_for('catalogo') }}" style="color: #888; text-decoration: none; font-size: 0.9rem;">
                ✖ Cancelar y volver al catálogo
            </a>
        </div>
    </div>
</div>
{% endblock %}
