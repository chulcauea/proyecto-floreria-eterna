{% extends "base.html" %}

{% block title %} Agregar Arreglo - Eterna Flor {% endblock %}

{% block content %}
    <h2 style="text-align: center; color: #d81b60;">Registrar Nuevo Arreglo</h2>
    
    <div style="max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <form action="/guardar_arreglo" method="POST">
            <div style="margin-bottom: 15px;">
                <label>Nombre del Arreglo:</label><br>
                <input type="text" name="nombre" required style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label>Cantidad (Stock):</label><br>
                <input type="number" name="cantidad" required style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label>Precio ($):</label><br>
                <input type="number" step="0.01" name="precio" required style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label>Descripción:</label><br>
                <textarea name="descripcion" rows="3" style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ddd;"></textarea>
            </div>
            
            <button type="submit" style="width: 100%; background-color: #4CAF50; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">
                Guardar Arreglo
            </button>
        </form>
        <br>
        <a href="/catalogo" style="text-align: center; display: block; color: #888;">Cancelar y volver</a>
    </div>
{% endblock %}
